<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts 环形图 - 飞书多维表格动态联动(3秒轮播)</title>
    <script src="https://fastly.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .chart-container {
            position: relative;
            width: 650px;
            height: 450px;
            background: transparent; 
            overflow: hidden;
        }

        #main {
            width: 100%;
            height: 100%;
            z-index: 3;
            position: relative;
        }

        /* 内圈边缘流光层 */
        .glow-effect {
            position: absolute;
            top: 58%; 
            left: 50%;
            width: 200px;
            height: 200px;
            margin-top: -100px;
            margin-left: -100px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            background: conic-gradient(
                from 0deg, transparent 0%, rgba(0, 242, 254, 0.05) 35%,
                rgba(0, 242, 254, 0.6) 47%, #00f2fe 50%, 
                rgba(0, 242, 254, 0.6) 53%, rgba(0, 242, 254, 0.05) 65%, transparent 100%
            );
            filter: blur(2px);
            -webkit-mask: radial-gradient(circle, transparent 84%, #000 85%);
            mask: radial-gradient(circle, transparent 84%, #000 85%);
        }
        .glow-effect.active { opacity: 1; }

        /* 圆心向外发散层 */
        .center-halo {
            position: absolute;
            top: 58%; left: 50%;
            width: 190px; height: 190px;
            margin-top: -95px; margin-left: -95px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: background 0.6s ease, opacity 0.4s ease;
            animation: pulseHalo 3s infinite ease-in-out;
        }
        .center-halo.active { opacity: 1; }

        @keyframes pulseHalo {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; filter: blur(12px); }
            100% { transform: scale(0.9); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div id="centerHalo" class="center-halo"></div>
        <div id="glowCircle" class="glow-effect"></div>
        <div id="main"></div>
    </div>

    <script type="text/javascript">
        var chartDom = document.getElementById('main');
        var glowCircle = document.getElementById('glowCircle');
        var centerHalo = document.getElementById('centerHalo');
        var myChart = echarts.init(chartDom);

        var baseColors = ['#3b82f6', '#ef4444', '#10b981', '#06b6d4', '#8b5cf6', '#f59e0b', '#ec4899', '#14b8a6'];
        var haloColors = [
            'rgba(59, 130, 246, 0.4)', 'rgba(239, 68, 68, 0.4)', 'rgba(16, 185, 129, 0.4)', 
            'rgba(6, 182, 212, 0.4)', 'rgba(139, 92, 246, 0.4)', 'rgba(245, 158, 11, 0.4)',
            'rgba(236, 72, 153, 0.4)', 'rgba(20, 184, 166, 0.4)'
        ];

        // ================= 飞书多维表格参数配置 =================
        var FEISHU_CONFIG = {
            app_id: '{{FEISHU_APP_ID}}',         // GitHub Actions 会自动替换此占位符
            app_secret: '{{FEISHU_APP_SECRET}}', // GitHub Actions 会自动替换此占位符
            app_token: 'ZDhbb342faDf9JsLmYHcwBqznnb',       // 【请替换】为你的多维表格 App Token
            table_id: 'tbl7GDYoJUdBi48s',             // 【请替换】为你的表格 Table ID
            name_field: '产线名称',                // 【请替换】多维表格中对应名称的列名
            value_field: '产量'                   // 【请替换】多维表格中对应数字的列名
        };

        var rawData = []; // 初始留空，等待飞书 API 异步加载数据
        var total = 0;
        var currentIndex = -1;
        var timer = null;

        // ================= 核心：从飞书获取数据逻辑 =================
        
        // 1. 获取飞书 tenant_access_token
        async function getFeishuToken() {
            const res = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify({
                    app_id: FEISHU_CONFIG.app_id,
                    app_secret: FEISHU_CONFIG.app_secret
                })
            });
            const data = await res.json();
            return data.tenant_access_token;
        }

        // 2. 读取多维表格记录并解析给 ECharts
        async function fetchFeishuBitableData() {
            try {
                const token = await getFeishuToken();
                const url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU_CONFIG.app_token}/tables/${FEISHU_CONFIG.table_id}/records?page_size=100`;
                
                const res = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const resData = await res.json();
                
                if (resData.code === 0 && resData.data.items) {
                    // 数据清洗与结构转换
                    rawData = resData.data.items.map(item => {
                        const fields = item.fields;
                        let nameVal = fields[FEISHU_CONFIG.name_field];
                        // 兼容处理：飞书文本型字段有时会返回数组格式 [ {text: "xxx"} ]
                        if (Array.isArray(nameVal)) {
                            nameVal = nameVal[0]?.text || '';
                        }
                        return {
                            name: nameVal ? String(nameVal).trim() : '',
                            value: Number(fields[FEISHU_CONFIG.value_field]) || 0
                        };
                    }).filter(d => d.name !== ''); // 过滤掉空行

                    // 成功获取数据后刷新图表
                    if (rawData.length > 0) {
                        myChart.setOption(getOption(), true);
                        // 如果是第一次加载或者索引越界，重置到首项
                        if (currentIndex === -1 || currentIndex >= rawData.length) {
                            currentIndex = 0;
                        }
                        updateEffect(currentIndex);
                    }
                } else {
                    console.error("飞书数据读取失败:", resData.msg);
                }
            } catch (error) {
                console.error("请求飞书接口发生网络错误:", error);
            }
        }

        // ================= ECharts 数据构建与配置 =================
        function buildChartData(data) {
            total = data.reduce((sum, item) => sum + Number(item.value), 0);
            return data.map((item, idx) => {
                var colorIdx = idx % baseColors.length;
                var baseColor = baseColors[colorIdx];
                return {
                    value: Number(item.value),
                    name: item.name,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 1, [
                            { offset: 0, color: lightenColor(baseColor, 40) }, 
                            { offset: 0.7, color: baseColor },                  
                            { offset: 1, color: darkenColor(baseColor, 30) }    
                        ])
                    }
                };
            });
        }

        function getOption() {
            return {
                backgroundColor: 'transparent', 
                title: {
                    text: '',
                    left: '20', top: '20',
                    textStyle: { color: '#fff', fontSize: 18, fontWeight: 'bold' }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(20, 24, 34, 0.9)',
                    borderColor: '#00f2fe',
                    borderWidth: 1,
                    textStyle: { color: '#fff' },
                    formatter: '{b}<br/>{c} ({d}%)'
                },
                legend: {
                    top: '12%', left: 'center',
                    textStyle: { color: '#ccc' },
                    icon: 'circle'
                },
                series: [
                    {
                        name: '',
                        type: 'pie',
                        center: ['50%', '58%'], 
                        radius: ['45%', '72%'], 
                        avoidLabelOverlap: false,
                        itemStyle: { borderRadius: 0, borderWidth: 0 },
                        label: { show: false, position: 'center' },
                        emphasis: {
                            scaleSize: 10, 
                            label: {
                                show: true,
                                formatter: function(params) {
                                    return '{val|' + params.value + '}\n{name|' + params.name + '}\n{percent|(' + params.percent + '%)}';
                                },
                                rich: {
                                    val: { fontSize: 36, fontWeight: 'bold', color: '#fff', lineHeight: 46 },
                                    name: { fontSize: 15, color: '#aaa', lineHeight: 24 },
                                    percent: { fontSize: 18, fontWeight: '500', color: '#00f2fe', lineHeight: 28 }
                                }
                            }
                        },
                        labelLine: { show: false },
                        data: buildChartData(rawData)
                    }
                ]
            };
        }

        function getAngleRange(index) {
            var startPercent = 0;
            for (var i = 0; i < index; i++) { startPercent += Number(rawData[i].value) / total; }
            var currentPercent = Number(rawData[index].value) / total;
            return 90 - ((startPercent + currentPercent / 2) * 360);
        }

        function updateEffect(index) {
            if (rawData.length === 0) return;
            if (currentIndex >= 0 && currentIndex < rawData.length) {
                myChart.dispatchAction({ type: 'downplay', seriesIndex: 0, dataIndex: currentIndex });
            }

            currentIndex = index % rawData.length;
            myChart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: currentIndex });

            var targetAngle = getAngleRange(currentIndex);
            var rotateDeg = -targetAngle + 90; 
            glowCircle.classList.add('active');
            glowCircle.style.transform = 'rotate(' + rotateDeg + 'deg)';

            var colorIdx = currentIndex % baseColors.length;
            centerHalo.classList.add('active');
            centerHalo.style.background = `radial-gradient(circle, ${haloColors[colorIdx]} 0%, ${haloColors[colorIdx].replace('0.4','0.1')} 50%, transparent 70%)`;
        }

        function startCarousel() {
            if (rawData.length === 0) return;
            clearInterval(timer); // 启动前先清除旧定时器，防止叠加
            timer = setInterval(function() {
                var nextIndex = (currentIndex + 1) % rawData.length;
                updateEffect(nextIndex);
            }, 3000); // 3秒切换一次
        }

        // ================= 页面初始化与生命周期 =================
        window.addEventListener('load', async () => {
            // 首次异步加载飞书多维表格数据
            await fetchFeishuBitableData();
            
            // 数据准备完毕后，延迟启动轮播动画
            setTimeout(function() { 
                if (rawData.length > 0) {
                    startCarousel(); 
                }
            }, 500);

            // 【定时同步】每隔 60 秒自动拉取一次飞书最新数据，实现无缝动态联动
            setInterval(fetchFeishuBitableData, 60000);
        });

        // ================= 鼠标交互动作 =================
        myChart.on('mouseover', function(params) {
            clearInterval(timer);
            if (params.dataIndex !== currentIndex) { updateEffect(params.dataIndex); }
        });

        myChart.on('mouseout', function(params) { 
            startCarousel(); 
        });

        // 注：原有的点击弹窗配置面板逻辑（openModal）已移除，全面交由飞书后台管控。

        // ================= 辅助颜色计算函数 =================
        function lightenColor(hex, percent) {
            var num = parseInt(hex.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }
        function darkenColor(hex, percent) {
            var num = parseInt(hex.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) - amt, G = (num >> 8 & 0x00FF) - amt, B = (num & 0x0000FF) - amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        window.addEventListener('resize', function() { myChart.resize(); });
    </script>
</body>
</html>
