name: Deploy ECharts with Secrets

on:
  push:
    branches:
      - main # 当你向 main 分支推送代码时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 核心步骤：用真正的 Secret 替换 HTML 里的占位符
    - name: Inject Secrets into HTML
      run: |
        sed -i 's/{{FEISHU_APP_ID}}/${{ secrets.FEISHU_APP_ID }}/g' index.html
        sed -i 's/{{FEISHU_APP_SECRET}}/${{ secrets.FEISHU_APP_SECRET }}/g' index.html

    # 如果你是免费账户，私有仓库无法直接开启 Pages，通常会发布到公开的 gh-pages 分支，
    # 或者你可以把替换后的文件部署到 Vercel / Netlify 等同样免费且支持私有部署的平台。
    # 这里以发布到当前仓库的另一个分支（用于部署）为例：
    - name: Deploy to Branch
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: . # 要部署的文件夹
        branch: release-prod # 带有真实密码的代码会被推送到这个分支